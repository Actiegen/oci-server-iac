- name: Setup Docker and deploy containers
  hosts: oci-server
  become: true
  vars:
    wg_host: "{{ lookup('env', 'WG_HOST') }}"
    wg_password: "{{ lookup('env', 'WG_PASSWORD') }}"

  tasks:
    # --- OS Hardening ---

    - name: Install security and kernel packages
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - fail2ban
          - ca-certificates
          - curl
          - "linux-modules-extra-{{ ansible_kernel }}"
        state: present
        update_cache: true

    - name: Ensure ip6_tables loads on boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/ip6_tables.conf
        content: "ip6_tables\n"
        mode: "0644"

    - name: Load ip6_tables module now
      ansible.builtin.command: modprobe ip6_tables
      changed_when: false

    - name: Enable unattended-upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        mode: "0644"

    - name: Configure fail2ban for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          maxretry = 5
          bantime = 3600
          findtime = 600
        mode: "0644"
      notify: Restart fail2ban

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Restart sshd

    - name: Disable SSH root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
      notify: Restart sshd

    - name: Set SSH client keepalive interval
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ClientAliveInterval"
        line: "ClientAliveInterval 60"
        state: present
      notify: Restart sshd

    - name: Set SSH client keepalive count max
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ClientAliveCountMax"
        line: "ClientAliveCountMax 3"
        state: present
      notify: Restart sshd

    # --- Shell Environment ---

    - name: Install zsh and git
      ansible.builtin.apt:
        name:
          - zsh
          - git
        state: present

    - name: Set fastfetch architecture
      ansible.builtin.set_fact:
        fastfetch_arch: "{{ 'aarch64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Check if fastfetch is installed
      ansible.builtin.command: which fastfetch
      register: fastfetch_check
      changed_when: false
      failed_when: false

    - name: Install fastfetch from GitHub release
      ansible.builtin.apt:
        deb: "https://github.com/fastfetch-cli/fastfetch/releases/latest/download/fastfetch-linux-{{ fastfetch_arch }}.deb"
        state: present
      when: fastfetch_check.rc != 0

    - name: Set ubuntu default shell to zsh
      ansible.builtin.user:
        name: ubuntu
        shell: /usr/bin/zsh

    - name: Check if oh-my-zsh is installed
      ansible.builtin.stat:
        path: /home/ubuntu/.oh-my-zsh
      register: oh_my_zsh

    - name: Install oh-my-zsh for ubuntu
      become: true
      become_user: ubuntu
      ansible.builtin.shell: |
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      when: not oh_my_zsh.stat.exists
      changed_when: true

    - name: Set oh-my-zsh theme to cloud
      become: true
      become_user: ubuntu
      ansible.builtin.lineinfile:
        path: /home/ubuntu/.zshrc
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="cloud"'
        state: present

    - name: Run fastfetch on zsh login
      become: true
      become_user: ubuntu
      ansible.builtin.lineinfile:
        path: /home/ubuntu/.zshrc
        line: fastfetch
        state: present

    # --- Docker Installation ---

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Set Docker APT arch
      ansible.builtin.set_fact:
        docker_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_arch }}]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    # --- WireGuard Deployment ---

    - name: Generate compose file from template
      ansible.builtin.template:
        src: compose/vpn-server.yml.j2
        dest: /home/ubuntu/vpn-server.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Run docker-compose up
      become: false
      become_user: ubuntu
      ansible.builtin.command: sudo docker compose -f /home/ubuntu/vpn-server.yml up -d
      register: docker_compose_output
      changed_when: "'Creating' in docker_compose_output.stdout or 'Starting' in docker_compose_output.stdout"

  handlers:
    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted
